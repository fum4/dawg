name: Setup Native Port Resolution
description: Install Zig toolchain and build the native port-resolution library.

inputs:
  zig-version:
    description: Zig version to install.
    required: false
    default: "0.15.2"

runs:
  using: composite
  steps:
    - uses: mlugg/setup-zig@v2
      with:
        version: ${{ inputs.zig-version }}

    - name: Build native port hook
      shell: bash
      run: pnpm nx run native-port-resolution:build
