# Auth setup:
#   1. Run `claude setup-token` locally (requires Claude subscription)
#   2. Copy the generated OAuth token (valid for 1 year)
#   3. Store it: gh secret set CLAUDE_CODE_OAUTH_TOKEN
#
# To rotate: repeat the steps above. The old token is invalidated.

name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git diff "origin/$BASE_REF"...HEAD > /tmp/pr-diff.txt
          cat /tmp/pr-diff.txt | claude --print \
            --max-turns 5 \
            "Review this pull request diff (provided via stdin) for code quality, bugs, security issues, and adherence to project conventions. Be concise and actionable." \
            > /tmp/review-output.txt

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review-output.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Claude Code Review\n\n${review}`
            });
